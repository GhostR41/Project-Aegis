<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Asteroid Defence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>
  <!-- Top Bar with Title -->
  <nav id="top-bar" class="utility-bar">
    <div class="nav-left">
      <span id="bar-title">AI Asteroid Defence</span>
    </div>
    <div class="nav-center">
      <!-- nav links removed per design update -->
    </div>
    <div class="nav-right">
      <a href="/working-soon.html" class="nav-btn-highlight" id="start-with-it-btn">Start with it</a>
    </div>
  </nav>

  <!-- Video Background Container (Forms first full section) -->
  <div class="video-container-wrapper">
    <div class="video-background" id="video-bg">
      <iframe id="yt-video"
        src="https://www.youtube.com/embed/Qsd8LwscwP4?autoplay=1&mute=1&controls=0&loop=1&playlist=Qsd8LwscwP4&playsinline=1&modestbranding=1&showinfo=0&rel=0&iv_load_policy=3&disablekb=1&enablejsapi=1&origin=http://localhost:5173"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="no-referrer-when-downgrade"
        loading="eager"
        allowfullscreen>
      </iframe>
    </div>
    <!-- Main Title (Centered over video) -->
    <div id="title-container">
      <h1 id="main-title">AI Asteroid Defence</h1>
    </div>
  </div>

  <!-- Asteroids Field (Visible behind transparent content) -->
  <div class="asteroids-layer">
    <div class="asteroid a1"></div>
    <div class="asteroid a2"></div>
    <div class="asteroid a3"></div>
    <div class="asteroid a4"></div>
    <div class="asteroid a5"></div>
  </div>

  <!-- Scroll Container -->
  <div class="scroll-container">
    <!-- Site Footer / Deadend -->
    <footer class="site-deadend">
      <div class="footer-left">
        <h3 style="display: flex; align-items: center; gap: 10px;">
          <span style="display:inline-block; width:18px; height:18px; background:#ff5e3a; border-radius:4px; transform:rotate(45deg);"></span>
          AI Asteroid Defence
        </h3>
        <p>Interactive visualization of autonomous planetary defense algorithms.</p>
      </div>
      <div class="footer-right">
        <div class="credit-row">
          <span class="credit-name">Search Space</span>
          <span class="credit-divider">-</span>
          <span class="credit-role">BFS, DFS, A* Exploration</span>
        </div>
        <div class="credit-row">
          <span class="credit-name">Decision Engine</span>
          <span class="credit-divider">-</span>
          <span class="credit-role">CSP, Minimax, Logic Base</span>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 AI Asteroid Defence. All rights reserved.</p>
      </div>
    </footer>

  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
